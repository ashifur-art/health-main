<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroke Risk Predictor - Auto BMI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bmi-display {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            font-size: 18px;
            border: 2px solid #667eea;
        }
        .bmi-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-brain"></i> Stroke Risk Prediction</h1>
            <p>Enter your height and weight - BMI calculated automatically!</p>
        </header>

        <div class="main-content">
            <div class="form-container">
                <h2><i class="fas fa-user-md"></i> Patient Information</h2>
                
                <!-- Auto BMI Display -->
                <div class="bmi-display" id="bmiDisplay" style="display: none;">
                    <i class="fas fa-weight-scale"></i>
                    <span>Your BMI: <span class="bmi-value" id="bmiValue">0.0</span></span>
                </div>
                
                <form id="predictionForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-venus-mars"></i> Gender</label>
                            <select id="gender" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-calendar-alt"></i> Age</label>
                            <input type="number" id="age" min="0" max="120" step="1" placeholder="Enter age" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-heartbeat"></i> Hypertension</label>
                            <select id="hypertension" required>
                                <option value="0">No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-heart"></i> Heart Disease</label>
                            <select id="heart_disease" required>
                                <option value="0">No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-ring"></i> Ever Married</label>
                            <select id="ever_married" required>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-briefcase"></i> Work Type</label>
                            <select id="work_type" required>
                                <option value="Private">Private</option>
                                <option value="Self-employed">Self-employed</option>
                                <option value="Govt_job">Government Job</option>
                                <option value="children">Children</option>
                                <option value="Never_worked">Never Worked</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-home"></i> Residence Type</label>
                            <select id="Residence_type" required>
                                <option value="Urban">Urban</option>
                                <option value="Rural">Rural</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-smoking"></i> Smoking Status</label>
                            <select id="smoking_status" required>
                                <option value="never smoked">Never Smoked</option>
                                <option value="formerly smoked">Formerly Smoked</option>
                                <option value="smokes">Smokes</option>
                                <option value="Unknown">Unknown</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-droplet"></i> Avg Glucose Level</label>
                            <input type="number" id="avg_glucose_level" min="50" max="300" step="0.1" placeholder="mg/dL" required>
                        </div>
                    </div>

                    <!-- Height and Weight Fields (Auto BMI) -->
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-arrow-up"></i> Height (cm)</label>
                            <input type="number" id="height_cm" min="100" max="250" step="0.1" 
                                   placeholder="e.g., 175" required oninput="calculateBMI()">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-weight-hanging"></i> Weight (kg)</label>
                            <input type="number" id="weight_kg" min="30" max="200" step="0.1" 
                                   placeholder="e.g., 70" required oninput="calculateBMI()">
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fas fa-stethoscope"></i> Predict Stroke Risk
                    </button>
                </form>
            </div>

            <!-- Results Container -->
            <div class="result-container" id="resultContainer" style="display: none;">
                <h2><i class="fas fa-chart-line"></i> Prediction Results</h2>
                <div class="result-card">
                    <div class="risk-indicator" id="riskIndicator"></div>
                    <div class="risk-level" id="riskLevel"></div>
                    
                    <div class="result-stats">
                        <div class="stat-box">
                            <span class="stat-icon">📊</span>
                            <span class="stat-label">Probability</span>
                            <span class="stat-value" id="probability">0%</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-icon">⚕️</span>
                            <span class="stat-label">Status</span>
                            <span class="stat-value" id="prediction">-</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-icon">📏</span>
                            <span class="stat-label">BMI</span>
                            <span class="stat-value" id="resultBMI">0.0</span>
                        </div>
                    </div>
                    
                    <div class="result-message" id="message"></div>
                    <button class="new-prediction-btn" onclick="resetForm()">
                        <i class="fas fa-redo-alt"></i> Make Another Prediction
                    </button>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div class="loading-spinner" id="loadingSpinner" style="display: none;">
            <div class="spinner"></div>
            <p>Analyzing patient data...</p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        function calculateBMI() {
            const height = parseFloat(document.getElementById('height_cm').value);
            const weight = parseFloat(document.getElementById('weight_kg').value);
            
            if (height > 0 && weight > 0) {
                const heightM = height / 100;
                const bmi = weight / (heightM * heightM);
                document.getElementById('bmiValue').textContent = bmi.toFixed(1);
                document.getElementById('bmiDisplay').style.display = 'block';
            } else {
                document.getElementById('bmiDisplay').style.display = 'none';
            }
        }

        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            document.getElementById('loadingSpinner').style.display = 'flex';
            
            const patientData = {
                gender: document.getElementById('gender').value,
                age: parseFloat(document.getElementById('age').value),
                hypertension: parseInt(document.getElementById('hypertension').value),
                heart_disease: parseInt(document.getElementById('heart_disease').value),
                ever_married: document.getElementById('ever_married').value,
                work_type: document.getElementById('work_type').value,
                Residence_type: document.getElementById('Residence_type').value,
                avg_glucose_level: parseFloat(document.getElementById('avg_glucose_level').value),
                height_cm: parseFloat(document.getElementById('height_cm').value),
                weight_kg: parseFloat(document.getElementById('weight_kg').value),
                smoking_status: document.getElementById('smoking_status').value
            };

            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(patientData)
                });

                const result = await response.json();
                
                if (!response.ok) throw new Error(result.detail || 'Prediction failed');
                
                document.getElementById('loadingSpinner').style.display = 'none';
                displayResults(result);
                
            } catch (error) {
                document.getElementById('loadingSpinner').style.display = 'none';
                alert('Error: ' + error.message);
            }
        });

        function displayResults(result) {
            document.querySelector('.form-container').style.display = 'none';
            document.getElementById('resultContainer').style.display = 'block';
            
            const indicator = document.getElementById('riskIndicator');
            indicator.className = 'risk-indicator ' + result.risk_level.toLowerCase();
            indicator.textContent = result.risk_level;
            
            document.getElementById('riskLevel').textContent = result.risk_level + ' Risk';
            document.getElementById('probability').textContent = (result.probability * 100).toFixed(1) + '%';
            document.getElementById('prediction').textContent = result.prediction === 1 ? 'At Risk' : 'Not at Risk';
            document.getElementById('resultBMI').textContent = result.bmi;
            
            const messageEl = document.getElementById('message');
            messageEl.textContent = result.message;
            
            if (result.risk_level === 'Low') {
                messageEl.style.background = '#e8f5e8';
                messageEl.style.color = '#2e7d32';
            } else if (result.risk_level === 'Medium') {
                messageEl.style.background = '#fff3e0';
                messageEl.style.color = '#ef6c00';
            } else {
                messageEl.style.background = '#ffebee';
                messageEl.style.color = '#c62828';
            }
        }

        function resetForm() {
            document.getElementById('predictionForm').reset();
            document.getElementById('bmiDisplay').style.display = 'none';
            document.querySelector('.form-container').style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';
        }
    </script>
</body>
</html>
